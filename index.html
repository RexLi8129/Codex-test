<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Doodle Hop</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Mini Doodle Hop</h1>
      <p class="instructions">Move with ← → or A / D. Reach the highest score.</p>
      <div class="hud">
        <span>Score: <strong id="score">0</strong></span>
        <button id="restart">Restart</button>
      </div>
      <canvas id="game" width="360" height="540" aria-label="Doodle jump style game"></canvas>
      <p id="status" class="status" aria-live="polite"></p>
    </main>

    <script src="game.js"></script>
  </body>
</html>
