<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doodle Jump - Web Edition</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-wrapper">
      <h1>Doodle Jump</h1>
      <div class="hud">
        <div>Score: <span id="score">0</span></div>
        <button id="restart" type="button">Restart</button>
      </div>
      <canvas id="game" width="400" height="600" aria-label="Doodle Jump game canvas"></canvas>
      <p class="controls">Move with ◀ ▶ or A / D. Keep climbing!</p>
    </main>
    <script src="script.js"></script>
  </body>
</html>
